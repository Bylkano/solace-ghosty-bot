# Pings the Render web service so the free tier does not sleep.
# Set repository variable RENDER_HEALTH_URL to your service URL, e.g.
#   https://your-bot-name.onrender.com/health
name: Keep Render Awake

on:
  schedule:
    # Every 5 minutes (GitHub may delay a bit; still usually enough)
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        env:
          RENDER_HEALTH_URL: ${{ vars.RENDER_HEALTH_URL }}
        run: |
          if [ -z "$RENDER_HEALTH_URL" ]; then
            echo "Missing repo variable RENDER_HEALTH_URL"
            echo "GitHub → Settings → Secrets and variables → Actions → Variables"
            echo "Add RENDER_HEALTH_URL = https://YOUR-SERVICE.onrender.com/health"
            exit 1
          fi
          echo "Pinging $RENDER_HEALTH_URL"
          curl -fsS --max-time 90 "$RENDER_HEALTH_URL"
          echo
          echo "OK"
